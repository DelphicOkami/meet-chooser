name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: zip -r MeetChooser.zip MeetChooser.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MeetChooser.zip
          generate_release_notes: true
